# ─────────────────────────────────────────────────────────────
# arch-insights-oss — Service Registry
# ─────────────────────────────────────────────────────────────
#
# This file defines your service catalog. The plugin reads it to:
#   • Route architecture questions to the right repos
#   • Map feature areas to owning services
#   • Trace cross-service dependencies
#
# ─────────────────────────────────────────────────────────────

organization: "yyqyang"

# ─────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────
services:

  # ── Personal repos ──────────────────────────────────────────

  event-edge:
    description: "Event-driven stock research copilot — tracks news events, identifies cross-sector spillover patterns, generates trade memos"
    language: python
    repo: "yyqyang/event-edge"
    team: personal
    dependencies:
      - rw-portfolio
      - postgresql
      - claude-api
      - voyageai
    docs_url: "https://github.com/yyqyang/event-edge"

  rw-portfolio:
    description: "Automated quantitative trading bot — runs on GCP Cloud Functions, trades via Alpaca API, executes multiple independent strategies before market close"
    language: python
    repo: "yyqyang/rw-portfolio"
    team: personal
    dependencies:
      - alpaca-api
      - gcp-cloud-functions
    docs_url: "https://github.com/yyqyang/rw-portfolio"

  rw-arb:
    description: "Arbitrage trading system"
    language: python
    repo: "yyqyang/rw-arb"
    team: personal
    dependencies:
      - rw-portfolio

  arch-insights-oss:
    description: "Architecture insights plugin — trace code paths, investigate issues, get design recommendations across multi-repo codebases"
    language: shell
    repo: "yyqyang/arch-insights-oss"
    team: personal
    dependencies: []
    docs_url: "https://github.com/yyqyang/arch-insights-oss"

  # ── RWLab org (Robot Wealth) ────────────────────────────────

  rwRtools:
    description: "R tools for accessing Robot Wealth Lab datasets — equity factors, risk premia, research pod data"
    language: r
    repo: "RWLab/rwRtools"
    team: rwlab
    dependencies:
      - gcs-data-library
    docs_url: "https://github.com/RWLab/rwRtools"

  tlaqData:
    description: "Data package for the Trade Like a Quant bootcamp"
    language: r
    repo: "RWLab/tlaqData"
    team: rwlab
    dependencies: []
    docs_url: "https://github.com/RWLab/tlaqData"

  rwlab-helpers:
    description: "R helper functions for RWLab research workflows"
    language: r
    repo: "RWLab/rwlab-helpers"
    team: rwlab
    dependencies:
      - rwRtools

# ─────────────────────────────────────────────────────────────
# Feature Areas
# ─────────────────────────────────────────────────────────────
feature_areas:

  trading:
    - rw-portfolio
    - rw-arb
    - event-edge

  stock-research:
    - event-edge
    - rwRtools
    - tlaqData

  strategies:
    - rw-portfolio
    - rw-arb

  event-ingestion:
    - event-edge

  quant-research:
    - rwRtools
    - tlaqData
    - rwlab-helpers

  ai-tooling:
    - arch-insights-oss

# ─────────────────────────────────────────────────────────────
# Teams
# ─────────────────────────────────────────────────────────────
teams:

  personal:
    slack_channel: ""
    oncall_rotation: ""

  rwlab:
    slack_channel: ""
    oncall_rotation: ""
